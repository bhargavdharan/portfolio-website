<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#e91e63"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Heart shape -->
  <path d="M200 160
           Q200 160 185 145
           Q165 125 165 108
           Q165 90 180 85
           Q195 80 200 95
           Q205 80 220 85
           Q235 90 235 108
           Q235 125 215 145 Z"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Heartbeat line through heart -->
  <path d="M155 118 L182 118 L188 100 L196 135 L204 105 L210 118 L245 118"
        fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Plus/cross icon -->
  <rect x="194" y="165" width="12" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="198.5" y="161" width="3" height="12" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Text -->
  <text x="200" y="225" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="bold" fill="rgba(255,255,255,0.95)" letter-spacing="1">
    MedTrack
  </text>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">
    HEALTH MONITORING
  </text>
</svg>