<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M200 60 L240 80 L240 130 Q240 170 200 190 Q160 170 160 130 L160 80 Z"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Lock body -->
  <rect x="187" y="120" width="26" height="20" rx="3" fill="rgba(255,255,255,0.9)"/>
  <!-- Lock shackle -->
  <path d="M192 120 L192 110 Q192 100 200 100 Q208 100 208 110 L208 120"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="200" cy="128" r="2.5" fill="#2980b9"/>
  <rect x="199" y="129" width="2" height="5" rx="1" fill="#2980b9"/>
  <!-- Text -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="bold" fill="rgba(255,255,255,0.95)" letter-spacing="1">
    SecureAuth
  </text>
  <text x="200" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">
    AUTHENTICATION SYSTEM
  </text>
</svg>