<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a8a5c"/>
      <stop offset="100%" style="stop-color:#16a085"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Task list container -->
  <rect x="165" y="60" width="70" height="90" rx="6" fill="none"
        stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
  <!-- Task line 1 - checked -->
  <rect x="176" y="75" width="10" height="10" rx="2" fill="none"
        stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
  <path d="M178 80 L181 83 L186 77" fill="none"
        stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="191" y="78" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Task line 2 - checked -->
  <rect x="176" y="95" width="10" height="10" rx="2" fill="none"
        stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
  <path d="M178 100 L181 103 L186 97" fill="none"
        stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="191" y="98" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Task line 3 - unchecked -->
  <rect x="176" y="115" width="10" height="10" rx="2" fill="none"
        stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
  <rect x="191" y="118" width="35" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Flow arrow -->
  <path d="M200 160 L200 185" fill="none"
        stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  <path d="M194 179 L200 187 L206 179" fill="none"
        stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="200" y="225" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="bold" fill="rgba(255,255,255,0.95)" letter-spacing="1">
    TaskFlow
  </text>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">
    PROJECT MANAGEMENT
  </text>
</svg>