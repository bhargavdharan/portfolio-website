<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f0d"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Outer shield -->
  <path d="M200 55 L250 80 L250 140 Q250 185 200 210 Q150 185 150 140 L150 80 Z"
        fill="none" stroke="rgba(46,204,113,0.6)" stroke-width="2"/>
  <!-- Inner shield -->
  <path d="M200 70 L238 90 L238 138 Q238 175 200 195 Q162 175 162 138 L162 90 Z"
        fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Checkmark -->
  <path d="M183 132 L195 145 L218 115"
        fill="none" stroke="rgba(46,204,113,0.95)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="200" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="bold" fill="rgba(255,255,255,0.95)" letter-spacing="1">
    CyberShield
  </text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">
    SECURITY PLATFORM
  </text>
</svg>