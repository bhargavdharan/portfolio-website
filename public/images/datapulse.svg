      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="168" y="135" width="14" height="45" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="186" y="110" width="14" height="70" rx="2" fill="rgba(255,255,255,0.65)"/>
  <rect x="204" y="85" width="14" height="95" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="222" y="120" width="14" height="60" rx="2" fill="rgba(255,255,255,0.6)"/>
